# fly.toml app configuration file generated for zstrike-google-mcp on 2026-04-09T12:49:56+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'zstrike-google-mcp'
primary_region = 'ewr'

[build]

[env]
  MCP_ENABLE_OAUTH21 = "true"
  WORKSPACE_EXTERNAL_URL = "https://zstrike-google-mcp.fly.dev"
  WORKSPACE_MCP_ALLOWED_CLIENT_REDIRECT_URIS = "https://app.wicket.sh/callback,https://stg-app.wicket.sh/callback"
  WORKSPACE_MCP_REQUIRE_AUTHORIZATION_CONSENT = "false"
  WORKSPACE_MCP_OAUTH_PROXY_STORAGE_BACKEND = "disk"
  WORKSPACE_MCP_OAUTH_PROXY_DISK_DIRECTORY = "/data/oauth-proxy"
  WORKSPACE_MCP_CREDENTIALS_DIR = "/data/credentials"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpus = 1

[mounts]
  source = "google_workspace_data"
  destination = "/data"
